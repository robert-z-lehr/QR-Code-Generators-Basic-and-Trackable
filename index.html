<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <main class="page">
    <h1>QR Code Generator</h1>
    <p class="subtitle">Basic QR on the left. Trackable QR on the right.</p>

    <section class="grid">
      <div class="panel">
        <h2>Basic QR Code</h2>

        <label for="basicText">URL or text</label>
        <input id="basicText" type="text" placeholder="https://example.com" />

        <button id="generateBasicBtn">Generate Basic QR</button>

        <div id="basicQrBox" class="qr-box"></div>

        <div class="meta basic-meta"></div>

        <button id="downloadBasicBtn" class="secondary">Download Basic QR</button>
      </div>

      <div class="panel">
        <h2>Trackable QR Code</h2>

        <label for="trackableLabel">Label</label>
        <input id="trackableLabel" type="text" placeholder="Campaign or label" />

        <label for="trackableUrl">Destination URL</label>
        <input id="trackableUrl" type="text" placeholder="https://example.com/landing-page" />

        <label for="notificationEmail">Notification email</label>
        <input id="notificationEmail" type="email" placeholder="name@example.com" />

        <label for="trackingMode">Tracking mode</label>
        <select id="trackingMode">
          <option value="direct">Direct redirect only</option>
          <option value="precise">Ask for precise location first</option>
        </select>

        <button id="generateTrackableBtn">Generate Trackable QR</button>

        <div id="trackableQrBox" class="qr-box"></div>

        <div id="trackableMeta" class="meta"></div>

        <button id="downloadTrackableBtn" class="secondary">Download Trackable QR</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
