<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
</head>
<body>
  <p id="status">Redirecting...</p>

  <script>
    const APPS_SCRIPT_WEB_APP_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get("id") || "").trim();
      const wantsPrecise = params.get("track") === "1";

      if (!id) {
        document.getElementById("status").textContent = "Missing tracking id.";
        return;
      }

      const payload = {
        action: "resolveAndLog",
        trackingId: id,
        userAgent: navigator.userAgent || ""
      };

      if (wantsPrecise && navigator.geolocation) {
        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 5000,
              maximumAge: 0
            });
          });

          payload.preciseLatitude = position.coords.latitude;
          payload.preciseLongitude = position.coords.longitude;
          payload.preciseAccuracyMeters = position.coords.accuracy;
        } catch (error) {
          // Ignore location failure and continue without precise location
        }
      }

      try {
        const response = await fetch(APPS_SCRIPT_WEB_APP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!result.ok || !result.destinationUrl) {
          document.getElementById("status").textContent =
            result.error || "Tracking failed.";
          return;
        }

        window.location.replace(result.destinationUrl);
      } catch (error) {
        document.getElementById("status").textContent =
          "Redirect failed: " + String(error);
      }
    }

    run();
  </script>
</body>
</html>
